services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: blueprint
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blueprint}
      POSTGRES_DB: blueprint
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blueprint -d blueprint"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  api:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATA_DIR: /data
      DATABASE_URL: postgresql+psycopg://blueprint:${POSTGRES_PASSWORD:-blueprint}@db:5432/blueprint
      DATALAB_API_KEY: ${DATALAB_API_KEY:-}
      DATALAB_MODE: ${DATALAB_MODE:-auto}
      EXTRACTION_MODE: ${EXTRACTION_MODE:-balanced}
    volumes:
      - app-data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  app-data:
  db-data:
